version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-salesflow}
      POSTGRES_USER: ${DB_USER:-salesflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-salesflow_secret_2024}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-salesflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
      # Repo-root marketing assets (paths used when MARKETING_STATIC_ROOT=/salesflow)
      - ./sales_assets:/salesflow/sales_assets:ro
      - ./presentations:/salesflow/presentations:ro
    environment:
      MARKETING_STATIC_ROOT: /salesflow
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery_worker:
    build: ./backend
    restart: always
    command: celery -A app.workers.celery_app worker -l info -c 4
    volumes:
      - ./backend/app:/app/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: ./backend
    restart: always
    command: celery -A app.workers.celery_app beat -l info
    volumes:
      - ./backend/app:/app/app
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
